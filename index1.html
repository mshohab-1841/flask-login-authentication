<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="text-center mt-5">
        <form style="max-width: 450px;margin: auto;" id="loginForm">
            <div class="text-center">
                <img class="mt-4 mb-4" height="100"
                    src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo-shadow@2x.png"
                    alt="bootstrap-logo-shadow">
                <h1><b>Sign in</b></h1>
                <label for="Emailaddress" class="visually-hidden">Email</label>
                <input required class="form-control mb-3" type="email" id="email" placeholder="Email address">
                <label class="visually-hidden" for="password">password</label>
                <input required class="form-control mb-3" type="password" id="password" placeholder="password">
                <div class="checkbox">
                    <label for="">
                        <input type="checkbox" value="remember me">Remember me
                    </label>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-lg btn-primary btn-block">Sign in</button>
                    <button type="button" onclick="registerUser()" class="btn btn-lg btn-primary w-100 mt-2">
                        Create Account
                    </button>
                </div>
            </div>
        </form>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (email === "" || password === "") {
                alert("Please enter email and password");
                return;
            }

            const res = await fetch("http://127.0.0.1:5000/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            alert(data.message);
        });

        async function registerUser() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("http://127.0.0.1:5000/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            alert(data.message);
        }
    </script>
</body>

</html>
